<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dynamic Dashboard viewer</title>
    <style>
      :root {
        --fg: #1a1a1a;
        --muted: #73726c;
        --bg: #ffffff;
        --accent: #185fa5;
        --border: rgba(0, 0, 0, 0.15);
      }
      :root[data-theme="dark"] {
        --fg: #e8e8e8;
        --muted: #9c9a92;
        --bg: #1e1e1e;
        --accent: #4ea1ff;
        --border: rgba(255, 255, 255, 0.15);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: var(--fg);
        background: var(--bg);
      }
      #root { padding: 8px; }
      .ddb-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .ddb-add {
        font: inherit;
        cursor: pointer;
        border: 1px solid var(--accent);
        color: var(--accent);
        background: transparent;
        border-radius: 8px;
        padding: 4px 10px;
      }
      .ddb-add[disabled] { opacity: 0.6; cursor: default; }
      .ddb-status { color: var(--muted); font-size: 12px; }
      .ddb-status.err { color: #a32d2d; }
      .widget-frame { width: 100%; border: none; display: block; }
      .state-loading, .state-error { color: var(--muted); padding: 16px; font-size: 14px; }
      .state-error { color: #a32d2d; }
      .spinner {
        display: inline-block;
        width: 12px; height: 12px;
        margin-right: 8px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        vertical-align: middle;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/mcp-app.ts"></script>
  </body>
</html>
